  .stat-val { font-size: 24px; font-weight: 600; color: #1a1a2e; }
  .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: white; border: 1px solid #eee; border-radius: 14px; overflow: hidden; transition: box-shadow 0.2s, transform 0.2s; }

  .badge-discount { font-size: 11px; background: #EAF3DE; color: #3B6D11; padding: 3px 9px; border-radius: 20px; font-weight: 500; }

  .card-dorms { font-size: 12px; color: #888; margin-bottom: 8px; }
  .card-footer { display: flex; gap: 8px; margin-top: 14px; }
  .btn-ver { flex: 1; padding: 9px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; text-align: center; text-decoration: none; display: block; transition: all 0.15s; }

  .btn-ver-secondary { background: white; color: #1a1a1a; border: 1px solid #ddd; }

  .empty { text-align: center; padding: 4rem 2rem; color: #aaa; grid-column: 1/-1; background: white; border-radius: 14px; border: 1px solid #eee; }
  .footer { margin-top: 2.5rem; text-align: center; font-size: 12px; color: #bbb; padding-bottom: 2rem; }

  @media (max-width: 620px) {

  const grid = document.getElementById('results-grid');

  let filtered = projects;
  if (comuna) filtered = filtered.filter(p => p.comuna === comuna);
  if (dorm !== '') filtered = filtered.filter(p => p.dorms.includes(parseInt(dorm)));

  const prices = filtered.map(p => p.precio);
  const minPrice = prices.length ? Math.min(...prices) : 0;
  const comunas = new Set(filtered.map(p => p.comuna)).size;

  document.getElementById('count-total').textContent = filtered.length;
  document.getElementById('count-min').textContent = prices.length ? fmt(minPrice) : '—';
  document.getElementById('count-comunas').textContent = comunas;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div style="font-size:36px;margin-bottom:12px;">🔍</div><div style="font-size:16px;font-weight:600;color:#555;margin-bottom:6px;">Sin resultados</div><p style="font-size:13px;">Prueba cambiando los filtros</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card">
      <img class="card-img" src="${p.img}" alt="${p.name}" onerror="this.style.background='#e8e8e8';" />
      <div class="card-body">
        <div class="badges">
          <span class="badge-comuna">📍 ${p.comuna}</span>
          <span class="badge-discount">🏷 En promoción</span>
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-dorms">Tipologías: ${p.dorms.map(dormLabel).join(' · ')}</div>
        <div class="card-price">${fmt(p.precio)} <span>/mes desde</span></div>
        <div class="card-footer">
          <a href="${p.url}" target="_blank" class="btn-ver btn-ver-primary">Ver detalle ↗</a>
          <a href="https://wa.me/56950256021" target="_blank" class="btn-ver btn-ver-secondary">💬 Contactar</a>
        </div>
      </div>
    </div>
  `).join('');
}

renderCards();
</script>
</body>
</html>
